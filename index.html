<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ireland Voting Simulation - Ballot Foundation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script defer src="./js/ballot-manager.js"></script>
  </head>
  <body class="bg-light">
    <main class="container py-4">
      <section class="card shadow-sm mb-4">
        <div class="card-body">
          <h1 class="h3 mb-3">투표지 생성</h1>
          <p class="text-muted mb-4">
            1순위는 필수이며, 순위는 1부터 연속되어야 합니다.
          </p>

          <form id="ballot-form" novalidate>
            <div id="preference-list" class="vstack gap-2 mb-3"></div>
            <div class="d-flex gap-2">
              <button type="button" id="add-preference" class="btn btn-outline-secondary">
                선호도 추가
              </button>
              <button type="submit" class="btn btn-primary">투표지 생성</button>
            </div>
          </form>

          <div id="form-feedback" class="alert alert-danger mt-3 d-none" role="alert"></div>
        </div>
      </section>

      <section class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 mb-0">생성된 투표지</h2>
            <span id="ballot-count" class="badge text-bg-secondary">0개</span>
          </div>

          <div class="table-responsive">
            <table class="table table-striped align-middle mb-0">
              <thead>
                <tr>
                  <th scope="col">투표지 ID</th>
                  <th scope="col">선호도 목록</th>
                  <th scope="col" class="text-end">작업</th>
                </tr>
              </thead>
              <tbody id="ballot-table-body">
                <tr id="empty-row">
                  <td colspan="3" class="text-center text-muted py-4">아직 생성된 투표지가 없습니다.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
